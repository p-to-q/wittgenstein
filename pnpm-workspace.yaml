packages:
  - "packages/*"
  # Explicit app allowlist instead of `apps/*`: ad-hoc or build-output dirs
  # (gitignored ad-hoc Vercel output dirs, a stray Finder `apps/site copy/`)
  # must not get pulled into the workspace and trip `pnpm install --frozen-lockfile`.
  - "apps/presentation"
  - "apps/site"
